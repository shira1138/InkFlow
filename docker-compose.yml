version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: inkflow_postgres
    environment:
      POSTGRES_USER: inkflow
      POSTGRES_PASSWORD: inkflow
      POSTGRES_DB: inkflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inkflow"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
